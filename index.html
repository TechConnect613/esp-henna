<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SumUp OAuth2</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success { color: #27ae60; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 SumUp OAuth2</h1>
        <div id="status">
            <div class="spinner"></div>
            <p>Processing...</p>
        </div>
    </div>
    
    <script>
        // Get the authorization code from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');
        
        const statusDiv = document.getElementById('status');
        
        if (error) {
            statusDiv.innerHTML = `
                <div class="error">❌ Authentication failed</div>
                <p>Error: ${error}</p>
                <p>Please try again in the app.</p>
            `;
        } else if (code) {
            statusDiv.innerHTML = `
                <div class="success">✅ Authentication successful!</div>
                <p>Redirecting back to the app...</p>
            `;
            // Send the code back to your app
            setTimeout(() => {
                window.location.href = `com.kom://auth?code=${code}`;
            }, 1000);
        } else {
            // Redirect to SumUp OAuth2
            const clientId = 'YOUR_SUMUP_CLIENT_ID';
            const redirectUri = 'https://YOUR_VERCEL_APP.vercel.app';
            const scope = 'payments transactions offline_access';
            
            statusDiv.innerHTML = `
                <div class="spinner"></div>
                <p>Redirecting to SumUp...</p>
            `;
            
            window.location.href = `https://api.sumup.com/oauth2/authorize?response_type=code&client_id=${clientId}&redirect_uri=${redirectUri}&scope=${scope}`;
        }
    </script>
</body>
</html>
